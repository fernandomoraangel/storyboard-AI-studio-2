    <style>
      /* FIX: Ensure dropdown options are readable. Browsers often default to a
         light background for <option> elements, which conflicts with the app's
         white text. This rule forces option text to be black for readability. */
      select option {
        color: black;
      }
      .dragging-item {
        opacity: 0.5;
        background: #1f2937; /* gray-800 */
      }
      .drag-over-placeholder::before {
        content: '';
        position: absolute;
        top: -4px;
        left: 0;
        right: 0;
        height: 4px;
        background-color: #6366f1; /* indigo-500 */
        border-radius: 2px;
      }
      .drag-handle {
        cursor: grab;
      }
      .drag-handle:active {
        cursor: grabbing;
      }
    </style>
